<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:20px}
  .swrow{display:flex;gap:10px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:54px;border-radius:var(--r-md);border:1px solid var(--border)}
  .nm{font:var(--fw-semibold) 12px/1.2 var(--font-sans)}
  .hex{font:var(--fw-regular) 11px/1.2 var(--font-sans);color:var(--muted);font-variant-numeric:tabular-nums}
  
</style></head><body><div class="wrap"><div class="swrow">
  <div class="sw"><div class="chip" style="background:var(--zona-z1);height:54px"></div><div class="nm">Z1 · Recuperación</div><div class="hex">50–60% · #38bdf8</div></div>
  <div class="sw"><div class="chip" style="background:var(--zona-z2);height:54px"></div><div class="nm">Z2 · Suave</div><div class="hex">60–70% · #2dd4bf</div></div>
  <div class="sw"><div class="chip" style="background:var(--zona-z3);height:54px"></div><div class="nm">Z3 · Aeróbico</div><div class="hex">70–80% · #a3e635</div></div>
  <div class="sw"><div class="chip" style="background:var(--zona-z4);height:54px"></div><div class="nm">Z4 · Umbral</div><div class="hex">80–90% · #fb923c</div></div>
  <div class="sw"><div class="chip" style="background:var(--zona-z5);height:54px"></div><div class="nm">Z5 · Máximo</div><div class="hex">90–100% · #ef4444</div></div>
</div>
<p style="margin:14px 0 0;color:var(--muted);font:400 12px/1.4 var(--font-sans)">Rampa térmica frío→caliente. Identidad ShapeUp · módulo de Salud / cardio.</p></div></body></html>
