<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:20px}
  .swrow{display:flex;gap:10px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:54px;border-radius:var(--r-md);border:1px solid var(--border)}
  .nm{font:var(--fw-semibold) 12px/1.2 var(--font-sans)}
  .hex{font:var(--fw-regular) 11px/1.2 var(--font-sans);color:var(--muted);font-variant-numeric:tabular-nums}
  
</style></head><body><div class="wrap"><div style="display:flex;align-items:center;gap:28px">
  <div style="text-align:center"><div style="font:800 52px/1 var(--font-sans);font-variant-numeric:tabular-nums;letter-spacing:-.04em;color:var(--accent)">1:30</div><div class="hex" style="margin-top:6px">timer descanso</div></div>
  <div style="text-align:center"><div style="font:800 52px/1 var(--font-sans);font-variant-numeric:tabular-nums;letter-spacing:-.04em">82.5</div><div class="hex" style="margin-top:6px">carga (kg)</div></div>
  <div style="text-align:center"><div style="font:700 22px/1 var(--font-sans);font-variant-numeric:tabular-nums">12.480</div><div class="hex" style="margin-top:6px">tonelaje</div></div>
</div>
<p style="margin:16px 0 0;color:var(--muted);font:400 12px/1.4 var(--font-sans)">Cifras atléticas: peso 800, tabular-nums, tracking ajustado. La identidad tipográfica vive en el peso, no en la familia (system-ui).</p></div></body></html>
