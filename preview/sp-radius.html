<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:20px}
  .nm{font:var(--fw-semibold) 12px/1.2 var(--font-sans)}
  .hex{font:400 11px/1.2 var(--font-sans);color:var(--muted)}
.rbox{background:var(--card-hover);border:1px solid var(--border)}</style></head><body><div class="wrap">
<div style="display:flex;gap:18px;align-items:flex-end">
  
  <div style="text-align:center"><div class="rbox" style="width:84px;height:64px;border-radius:8px;"></div>
  <div class="nm" style="margin-top:8px">--r-sm</div><div class="hex">8px</div></div>
  <div style="text-align:center"><div class="rbox" style="width:84px;height:64px;border-radius:12px;"></div>
  <div class="nm" style="margin-top:8px">--r-md</div><div class="hex">12px</div></div>
  <div style="text-align:center"><div class="rbox" style="width:84px;height:64px;border-radius:18px;"></div>
  <div class="nm" style="margin-top:8px">--r-lg</div><div class="hex">18px</div></div>
  <div style="text-align:center"><div class="rbox" style="width:84px;height:64px;border-radius:40px;border-radius:999px"></div>
  <div class="nm" style="margin-top:8px">--r-full</div><div class="hex">999px</div></div>
</div></div></body></html>
