<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:20px}
  .swrow{display:flex;gap:10px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:54px;border-radius:var(--r-md);border:1px solid var(--border)}
  .nm{font:var(--fw-semibold) 12px/1.2 var(--font-sans)}
  .hex{font:var(--fw-regular) 11px/1.2 var(--font-sans);color:var(--muted);font-variant-numeric:tabular-nums}
  
</style></head><body><div class="wrap"><div class="swrow">
  <div class="sw"><div class="chip" style="background:var(--member-juanpablo);display:flex;align-items:center;justify-content:center;color:#fff;font:700 15px/1 var(--font-sans);border-radius:50%;height:54px;width:54px;margin:0 auto">JP</div><div class="nm" style="text-align:center">Juan Pablo</div><div class="hex" style="text-align:center">51 · #60a5fa</div></div>
  <div class="sw"><div class="chip" style="background:var(--member-maria);display:flex;align-items:center;justify-content:center;color:#fff;font:700 15px/1 var(--font-sans);border-radius:50%;height:54px;width:54px;margin:0 auto">M</div><div class="nm" style="text-align:center">María</div><div class="hex" style="text-align:center">50 · #f472b6</div></div>
  <div class="sw"><div class="chip" style="background:var(--member-sofia);display:flex;align-items:center;justify-content:center;color:#fff;font:700 15px/1 var(--font-sans);border-radius:50%;height:54px;width:54px;margin:0 auto">S</div><div class="nm" style="text-align:center">Sofía</div><div class="hex" style="text-align:center">17 · #a78bfa</div></div>
  <div class="sw"><div class="chip" style="background:var(--member-federico);display:flex;align-items:center;justify-content:center;color:#fff;font:700 15px/1 var(--font-sans);border-radius:50%;height:54px;width:54px;margin:0 auto">F</div><div class="nm" style="text-align:center">Federico</div><div class="hex" style="text-align:center">16 · #34d399</div></div>
</div></div></body></html>
