<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:20px}
  .swrow{display:flex;gap:10px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:54px;border-radius:var(--r-md);border:1px solid var(--border)}
  .nm{font:var(--fw-semibold) 12px/1.2 var(--font-sans)}
  .hex{font:var(--fw-regular) 11px/1.2 var(--font-sans);color:var(--muted);font-variant-numeric:tabular-nums}
  
</style></head><body><div class="wrap"><div style="display:flex;flex-direction:column;gap:12px">
  <div style="display:flex;align-items:baseline;gap:14px"><span class="hex" style="width:74px">3xl · 800</span><span style="font:800 36px/1 var(--font-sans);letter-spacing:-.02em">ShapeUp</span></div>
  <div style="display:flex;align-items:baseline;gap:14px"><span class="hex" style="width:74px">2xl · 800</span><span style="font:800 28px/1 var(--font-sans);letter-spacing:-.02em">Press de banca</span></div>
  <div style="display:flex;align-items:baseline;gap:14px"><span class="hex" style="width:74px">xl · 700</span><span style="font:700 22px/1 var(--font-sans)">Hoy toca</span></div>
  <div style="display:flex;align-items:baseline;gap:14px"><span class="hex" style="width:74px">lg · 600</span><span style="font:600 16px/1 var(--font-sans)">Empuje de tren superior</span></div>
  <div style="display:flex;align-items:baseline;gap:14px"><span class="hex" style="width:74px">base · 400</span><span style="font:400 14px/1 var(--font-sans)">La recuperación es parte del entrenamiento.</span></div>
  <div style="display:flex;align-items:baseline;gap:14px"><span class="hex" style="width:74px">xs · 600</span><span style="font:600 11px/1 var(--font-sans);text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">Programa activo</span></div>
</div></div></body></html>
