<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:20px}
  .nm{font:var(--fw-semibold) 12px/1.2 var(--font-sans)}
  .hex{font:400 11px/1.2 var(--font-sans);color:var(--muted)}

  .btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:10px;background:var(--accent);color:#0a1208;border:none;border-radius:var(--r-md);padding:14px 28px;font:600 15px/1 var(--font-sans);cursor:pointer}
  .btn-secondary{display:inline-flex;align-items:center;justify-content:center;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 24px;font:400 14px/1 var(--font-sans);cursor:pointer}
  .btn-serie{padding:16px 28px;background:var(--accent);color:#0a1208;border:none;border-radius:var(--r-lg);font:700 16px/1 var(--font-sans)}
</style></head><body><div class="wrap"><div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
  <button class="btn-primary">Empezar sesión</button>
  <button class="btn-secondary">Ver rutinas</button>
  <button class="btn-serie">Serie 3 hecha ✓</button>
</div></div></body></html>
