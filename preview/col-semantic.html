<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:20px}
  .swrow{display:flex;gap:10px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:54px;border-radius:var(--r-md);border:1px solid var(--border)}
  .nm{font:var(--fw-semibold) 12px/1.2 var(--font-sans)}
  .hex{font:var(--fw-regular) 11px/1.2 var(--font-sans);color:var(--muted);font-variant-numeric:tabular-nums}
  
</style></head><body><div class="wrap"><div class="swrow">
  <div class="sw">
  <div class="chip" style="background:var(--danger);display:flex;align-items:center;justify-content:center;color:#0f1115;font:700 13px/1 var(--font-sans)">Aa</div>
  <div class="nm">danger</div><div class="hex">#f87171</div></div>
  <div class="sw">
  <div class="chip" style="background:var(--warning);display:flex;align-items:center;justify-content:center;color:#0f1115;font:700 13px/1 var(--font-sans)">Aa</div>
  <div class="nm">warning</div><div class="hex">#fbbf24</div></div>
  <div class="sw">
  <div class="chip" style="background:var(--info);display:flex;align-items:center;justify-content:center;color:#0f1115;font:700 13px/1 var(--font-sans)">Aa</div>
  <div class="nm">info</div><div class="hex">#60a5fa</div></div>
</div></div></body></html>
