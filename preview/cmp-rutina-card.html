<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:20px}
  .nm{font:var(--fw-semibold) 12px/1.2 var(--font-sans)}
  .hex{font:400 11px/1.2 var(--font-sans);color:var(--muted)}

  .rutina-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px}
  .rutina-card-title{font:600 16px/1 var(--font-sans);margin:0 0 10px}
  .rutina-card-meta{display:flex;flex-wrap:wrap;gap:8px;font:400 12px/1.4 var(--font-sans);color:var(--muted);align-items:center}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font:600 11px/1.5 var(--font-sans)}
  .badge-accent{background:var(--accent-dim);color:var(--accent)}
  .badge-muted{background:rgba(154,164,178,.12);color:var(--muted)}
</style></head><body><div class="wrap"><div class="rutina-card">
  <p class="rutina-card-title">Tren superior — Empuje</p>
  <div class="rutina-card-meta">
    <span class="badge badge-accent">Empuje</span>
    <span class="badge badge-muted">Intermedio</span>
    <span>· 6 ejercicios</span><span>· ⏱ 45 min</span>
  </div>
</div></div></body></html>
