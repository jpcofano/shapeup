<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:#07080b;font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .th{border-radius:14px;padding:12px;border:1px solid var(--border);background:var(--bg)}
  .nm{font:700 13px/1 var(--font-sans);color:var(--fg);margin-bottom:2px}
  .sub{font:400 10px/1.3 var(--font-sans);color:var(--muted);margin-bottom:10px}
  .btn{background:var(--accent);color:var(--on-accent);border:none;border-radius:9px;padding:8px 0;width:100%;font:600 11px/1 var(--font-sans);margin-bottom:7px}
  .row{display:flex;gap:6px;align-items:center}
  .chip{background:var(--accent-dim);color:var(--accent);border-radius:999px;padding:3px 8px;font:600 10px/1.3 var(--font-sans)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:8px;height:12px;margin-bottom:9px}
</style></head><body>
<div class="wrap">
  <div class="th" data-theme="ion"><div class="nm">Ion ★</div><div class="sub">cian · default</div><div class="card"></div><button class="btn">Empezar</button><div class="row"><span class="chip">Empuje</span><span class="dot"></span></div></div>
  <div class="th" data-theme="volt"><div class="nm">Volt</div><div class="sub">verde</div><div class="card"></div><button class="btn">Empezar</button><div class="row"><span class="chip">Empuje</span><span class="dot"></span></div></div>
  <div class="th" data-theme="solar"><div class="nm">Solar</div><div class="sub">ámbar</div><div class="card"></div><button class="btn">Empezar</button><div class="row"><span class="chip">Empuje</span><span class="dot"></span></div></div>
  <div class="th" data-theme="blaze"><div class="nm">Blaze</div><div class="sub">naranja</div><div class="card"></div><button class="btn">Empezar</button><div class="row"><span class="chip">Empuje</span><span class="dot"></span></div></div>
  <div class="th" data-theme="crimson"><div class="nm">Crimson</div><div class="sub">rojo</div><div class="card"></div><button class="btn">Empezar</button><div class="row"><span class="chip">Empuje</span><span class="dot"></span></div></div>
  <div class="th" data-theme="pulse"><div class="nm">Pulse</div><div class="sub">rosa</div><div class="card"></div><button class="btn">Empezar</button><div class="row"><span class="chip">Empuje</span><span class="dot"></span></div></div>
  <div class="th" data-theme="grape"><div class="nm">Grape</div><div class="sub">púrpura</div><div class="card"></div><button class="btn">Empezar</button><div class="row"><span class="chip">Empuje</span><span class="dot"></span></div></div>
  <div class="th" data-theme="indigo"><div class="nm">Indigo</div><div class="sub">violeta</div><div class="card"></div><button class="btn">Empezar</button><div class="row"><span class="chip">Empuje</span><span class="dot"></span></div></div>
</div>
</body></html>
