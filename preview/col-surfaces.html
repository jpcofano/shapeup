<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:20px}
  .swrow{display:flex;gap:10px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:54px;border-radius:var(--r-md);border:1px solid var(--border)}
  .nm{font:var(--fw-semibold) 12px/1.2 var(--font-sans)}
  .hex{font:var(--fw-regular) 11px/1.2 var(--font-sans);color:var(--muted);font-variant-numeric:tabular-nums}
  
</style></head><body><div class="wrap"><div class="swrow">
  <div class="sw">
  <div class="chip" style="background:var(--bg)"></div>
  <div class="nm">bg</div><div class="hex">#0f1115</div></div>
  <div class="sw">
  <div class="chip" style="background:var(--card)"></div>
  <div class="nm">card</div><div class="hex">#171a21</div></div>
  <div class="sw">
  <div class="chip" style="background:var(--card-hover)"></div>
  <div class="nm">card-hover</div><div class="hex">#1e2130</div></div>
  <div class="sw">
  <div class="chip" style="background:var(--border)"></div>
  <div class="nm">border</div><div class="hex">#232733</div></div>
  <div class="sw">
  <div class="chip" style="background:var(--border-dim)"></div>
  <div class="nm">border-dim</div><div class="hex">#1c2030</div></div>
</div></div></body></html>
