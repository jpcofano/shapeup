<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:20px}
  .nm{font:var(--fw-semibold) 12px/1.2 var(--font-sans)}
  .hex{font:400 11px/1.2 var(--font-sans);color:var(--muted)}
</style></head><body><div class="wrap">
<div style="display:flex;gap:18px;align-items:center">
  <div style="text-align:center"><div style="width:120px;height:64px;background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:0 20px 60px rgba(0,0,0,.35)"></div><div class="nm" style="margin-top:10px">shadow-card</div><div class="hex">modales · auth</div></div>
  <div style="text-align:center"><div style="width:64px;height:64px;background:var(--accent);border-radius:50%;box-shadow:0 4px 16px rgba(74,222,128,.30)"></div><div class="nm" style="margin-top:10px">shadow-fab</div><div class="hex">glow verde</div></div>
  <div style="text-align:center"><div style="width:120px;height:64px;background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:0 4px 12px rgba(0,0,0,.40)"></div><div class="nm" style="margin-top:10px">shadow-menu</div><div class="hex">menús · sheets</div></div>
</div></div></body></html>
