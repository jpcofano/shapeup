<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:20px}
  .swrow{display:flex;gap:10px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:54px;border-radius:var(--r-md);border:1px solid var(--border)}
  .nm{font:var(--fw-semibold) 12px/1.2 var(--font-sans)}
  .hex{font:var(--fw-regular) 11px/1.2 var(--font-sans);color:var(--muted);font-variant-numeric:tabular-nums}
  
</style></head><body><div class="wrap"><div class="swrow">
  <div class="sw">
  <div class="chip" style="background:var(--fg);display:flex;align-items:center;justify-content:center;color:#0f1115;font:700 13px/1 var(--font-sans)">Aa</div>
  <div class="nm">fg</div><div class="hex">#f5f7fa</div></div>
  <div class="sw">
  <div class="chip" style="background:var(--muted);display:flex;align-items:center;justify-content:center;color:#0f1115;font:700 13px/1 var(--font-sans)">Aa</div>
  <div class="nm">muted</div><div class="hex">#9aa4b2</div></div>
</div>
<div style="margin-top:16px;display:flex;flex-direction:column;gap:3px">
  <span style="color:var(--fg);font:700 18px/1.3 var(--font-sans)">Texto principal sobre fondo oscuro</span>
  <span style="color:var(--muted);font:400 14px/1.4 var(--font-sans)">Texto secundario, hints y etiquetas en muted</span>
</div></div></body></html>
