<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:20px}
  .nm{font:var(--fw-semibold) 12px/1.2 var(--font-sans)}
  .hex{font:400 11px/1.2 var(--font-sans);color:var(--muted)}

  .banner{border-radius:var(--r-sm);padding:10px 12px;font:400 13px/1.5 var(--font-sans)}
  .banner ul{margin:4px 0 0;padding-left:16px}
  .banner-green{background:rgba(74,222,128,.1);color:#86efac;border:1px solid rgba(74,222,128,.2)}
  .banner-amber{background:rgba(251,191,36,.1);color:var(--warning);border:1px solid rgba(251,191,36,.2)}
  .banner-title{font:700 12px/1 var(--font-sans);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
</style></head><body><div class="wrap"><div style="display:flex;flex-direction:column;gap:10px">
  <div class="banner banner-green"><p class="banner-title">✅ Puntos clave</p><ul><li>Escápulas retraídas y pecho alto</li><li>Bajá la barra al esternón</li></ul></div>
  <div class="banner banner-amber"><p class="banner-title">⚠️ Errores comunes</p><ul><li>Rebotar la barra en el pecho</li><li>Codos demasiado abiertos</li></ul></div>
</div></div></body></html>
