<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css"><style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  .wrap{padding:20px}
  .nm{font:var(--fw-semibold) 12px/1.2 var(--font-sans)}
  .hex{font:400 11px/1.2 var(--font-sans);color:var(--muted)}
</style></head><body><div class="wrap">
<div style="display:flex;flex-direction:column;gap:9px">
  
  <div style="display:flex;align-items:center;gap:12px">
    <span class="hex" style="width:64px">--space-1</span>
    <div style="height:12px;width:4px;background:var(--accent);border-radius:3px"></div>
    <span class="hex">4px</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="hex" style="width:64px">--space-2</span>
    <div style="height:12px;width:8px;background:var(--accent);border-radius:3px"></div>
    <span class="hex">8px</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="hex" style="width:64px">--space-3</span>
    <div style="height:12px;width:12px;background:var(--accent);border-radius:3px"></div>
    <span class="hex">12px</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="hex" style="width:64px">--space-4</span>
    <div style="height:12px;width:16px;background:var(--accent);border-radius:3px"></div>
    <span class="hex">16px</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="hex" style="width:64px">--space-5</span>
    <div style="height:12px;width:20px;background:var(--accent);border-radius:3px"></div>
    <span class="hex">20px</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="hex" style="width:64px">--space-6</span>
    <div style="height:12px;width:24px;background:var(--accent);border-radius:3px"></div>
    <span class="hex">24px</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="hex" style="width:64px">--space-8</span>
    <div style="height:12px;width:32px;background:var(--accent);border-radius:3px"></div>
    <span class="hex">32px</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="hex" style="width:64px">--space-12</span>
    <div style="height:12px;width:48px;background:var(--accent);border-radius:3px"></div>
    <span class="hex">48px</span></div>
</div></div></body></html>
